server:
  port: 8001

spring:
  web:
    resources:
      add-mappings: true

  datasource:
    url: jdbc:mysql://localhost:3306/ai_school_conselor?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-test-query: select 1
      connection-timeout: 20000
      idle-timeout: 300000
      maximum-pool-size: 5
      minimum-idle: 5

  data:
    redis:
      host: localhost
      port: 6379

  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

  ai:
    model:
      chat: dashscope
      embedding: dashscope
    dashscope:
      api-key: sk-ce5fe88b18d84a6bb8cddfa6eb5eda54
      chat:
        options:
          model: qwen-plus
          temperature: 0.3
          top-p: 0.9
          max-token: 2000
      embedding:
        options:
          model: text-embedding-v4

  mail:
    protocol: smtps
    host: smtp.126.com
    port: 465
    username: buaa_smart_tutor@126.com
    password: ETgCVqqiiLptxyMk
    default-encoding: UTF-8
    from: buaa_smart_tutor@126.com
    properties:
      mail.smtp.socketFactoryClass: javax.net.ssl.SSLSocketFactory

milvus:
  uri: http://localhost:19530
  token:
  collection-name: knowledge
  metric-type: COSINE
  index-m: 48
  ef-construction: 200
  search-ef: 128
  max-text-length: 65535

storage:
  service-endpoint: http://localhost:9000
  access-key-id: rustfsadmin
  secret-access-key: rustfsadmin
  storage-bucket: uploads
  region: cn-beijing

file:
  parsing:
    chunk-mode: structure_aware
    chunk-size: 512
    overlap-size: 128
    semantic-target-chars: 1400
    semantic-max-chars: 1800
    semantic-min-chars: 600
    semantic-overlap-chars: 0
    buffer-size: 8192
    max-memory-threshold: 0.8
    max-upload-bytes: 104857600
    max-extracted-chars: 800000
    max-cleaned-chars: 500000

document:
  refresh:
    scan-delay-ms: 10000
    batch-size: 20
    min-interval-seconds: 60

elasticsearch:
  host: localhost
  port: 9200
  scheme: http
  index: knowledge

flow-limit:
  enable: true
  time-window: 3
  max-access-count: 20

stream:
  enabled: true
  key: rag:document:ingestion
  group: document-ingestion-group
  consumer: document-ingestion-consumer
  batch-size: 5
  block-ms: 1000
  poll-interval-ms: 500
  max-retries: 1

mcp:
  weather:
    enabled: true
    server-url: http://localhost:18080/mcp
    tool-name: weather_query
    connect-timeout-ms: 1500
    read-timeout-ms: 3000
    fallback-enabled: true


ai:
  prompt:
    ref-start: "<<参考资料开始>>"
    ref-end: "<<参考资料结束>>"
    no-result-text: "（当前未检索到相关资料）"
  generation:
    temperature: 0.3
    max-token: 2000
    top-p: 0.9

rag:
  embedding:
    batch-size: 10
    concurrency: 4
    max-retries: 2
    retry-backoff-ms: 400
  query-preprocess:
    enabled: true
    max-sub-questions: 6
  hyde:
    enabled: true
    max-tokens: 256
  fusion:
    enabled: true
    rrf-k: 60
    max-queries: 4
  rerank:
    enabled: true
    max-candidates: 8
    snippet-length: 200
    # 提供商优先级：dashscope(独立Rerank模型) → llm(LLM文本打分降级) → noop(直接截断兜底)
    provider-order:
      - dashscopec d
      - llm
      - noop
    dashscope:
      base-url: https://dashscope.aliyuncs.com
      # api-key 留空时自动继承 spring.ai.dashscope.api-key
      api-key:
      model: gte-rerank
      timeout-seconds: 15
  crag:
    enabled: true
    use-llm: true
    min-score: 0.2
    review-top-k: 3
    fallback-multiplier: 2
    ambiguity-words:
      - 这个
      - 那个
      - 之前
      - 上面
      - 怎么弄
      - 怎么办
    ambiguity-min-length: 6
  feedback:
    enabled: true
    max-boost: 0.15
  semantic-cache:
    enabled: true
    min-similarity: 0.92
    max-entries: 300
    ttl-minutes: 120
  memory:
    history-keep-turns: 4
    summary-enabled: true
    summary-start-turns: 8
    summary-max-chars: 320
    summary-max-tokens: 180
    min-delta-messages: 4
    default-max-history: 60
  retrieval:
    default-top-k: 5
    max-top-k: 10
    min-acceptable-score: 0.25
  prompt:
    max-reference-length: 300
    max-source-reference-count: 5
    temperature-kb: 0.0
    temperature-tool: 0.3
  search:
    channels:
      intent-directed:
        enabled: true
        min-intent-score: 0.55
        top-k-multiplier: 2
      vector-global:
        enabled: true
        confidence-threshold: 0.65
        top-k-multiplier: 2
        default-confidence: 0.7
    post-processor:
      deduplicate: true
      rerank: true
  intent-routing:
    semantic-direct-threshold: 0.9
    llm-rag-threshold: 0.5
    semantic-min-score: 0.7
  intent-guidance:
    enabled: true
    hit-threshold: 0.58
    ambiguity-ratio: 0.88
    max-candidates: 4
    max-options: 3
    llm-min-score: 0.45
  intent-resolution:
    per-query-max-candidates: 3
    max-total-candidates: 6
    min-score: 0.5
